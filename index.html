<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onze+ · MyBusiness</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --ink:#10150f;
    --text-soft:#6b716a;
    --text-faint:#9ba39c;
    --line:#ececea;
    --line-strong:#e2e3df;
    --card:#ffffff;

    --brand-green:#65eb8b;
    --brand-green-deep:#1d7a44;
    --side-dark-a:#173d27;
    --side-dark-b:#0a2015;

    --green-text:#0fa860;
    --green-tint:#e1faec;
    --amber-text:#d68a00;
    --amber-tint:#fdf1da;
    --rust-text:#e0403a;
    --rust-tint:#fde7e6;

    --vivid-green:#1fd97a;
    --vivid-yellow:#ffcd1f;
    --vivid-red:#ff4d4d;

    --cat-seniors-bg:#e0f2ee;
    --cat-seniors-text:#127a63;
    --cat-u17-bg:#e4e9fb;
    --cat-u17-text:#3d4ea3;
    --cat-u15-bg:#f2e6fb;
    --cat-u15-text:#7a3ba3;
  }

  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0; padding:22px;
    background:#eef0ee;
    min-height:100vh;
    color:var(--ink);
    font-family:'Geist',sans-serif;
    -webkit-font-smoothing:antialiased;
    position:relative;
    overflow-x:hidden;
  }
  body::before, body::after{
    content:''; position:fixed; border-radius:50%; filter:blur(70px); z-index:0; pointer-events:none;
  }
  body::before{width:420px; height:420px; background:radial-gradient(circle, rgba(101,235,139,0.35), transparent 70%); top:-120px; left:-100px;}
  body::after{width:380px; height:380px; background:radial-gradient(circle, rgba(101,235,139,0.22), transparent 70%); bottom:-140px; right:-80px;}

  .app-shell{position:relative; z-index:1; margin:0 auto; background:transparent; display:flex; align-items:flex-start; gap:20px; min-height:calc(100vh - 44px);}

  .sidebar-col{display:flex; flex-direction:column; align-items:center; gap:14px; position:sticky; top:22px;}
  .logo-fab{width:48px; height:48px; border-radius:50%; background:var(--brand-green); color:var(--side-dark-b); display:flex; align-items:center; justify-content:center; font-size:19px; box-shadow:0 10px 24px -8px rgba(101,235,139,0.6); cursor:pointer;}
  .sidebar{width:56px; flex-shrink:0; background:rgba(21,23,20,0.92); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px); border-radius:999px; padding:12px 0; display:flex; flex-direction:column; align-items:center; gap:6px; box-shadow:0 20px 40px -18px rgba(10,20,12,0.45);}
  .side-logo{display:none;}
  .side-shield{width:38px; height:38px; border-radius:50%; background:rgba(255,255,255,0.08); color:#fff; display:flex; align-items:center; justify-content:center; font-size:15px; cursor:pointer; margin-bottom:8px;}
  .side-shield.active{background:#fff; color:var(--side-dark-b);}
  .side-group{background:transparent; border-radius:20px; padding:0; display:flex; flex-direction:column; gap:6px; margin-bottom:8px;}
  .side-icon{width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,0.5); font-size:15px; cursor:pointer;}
  .side-icon.active{background:#fff; color:var(--side-dark-b);}
  .side-icon:hover:not(.active){color:#fff;}
  .side-spacer{flex:1;}

  .main{flex:1; min-width:0; display:flex; flex-direction:column; overflow-y:auto; background:rgba(255,255,255,0.78); backdrop-filter:blur(22px); -webkit-backdrop-filter:blur(22px); border:1px solid rgba(255,255,255,0.6); border-radius:32px; padding:24px 30px; box-shadow:0 24px 60px -30px rgba(20,30,20,0.25);}
  .topbar2{display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;}
  .wordmark{display:flex; align-items:center; gap:9px; font-weight:700; font-size:16px;}
  .wordmark .mark{width:27px; height:27px; border-radius:9px; background:var(--brand-green); color:var(--side-dark-b); display:flex; align-items:center; justify-content:center; font-size:12px;}
  .top-pills{display:flex; gap:10px;}
  .pill-club{display:flex; align-items:center; gap:8px; background:rgba(255,255,255,0.9); border:1px solid var(--line-strong); color:var(--ink); padding:6px 16px 6px 6px; border-radius:999px; font-size:12.5px; font-weight:600;}
  .pill-club .ic{width:26px; height:26px; border-radius:50%; background:#fdeceb; color:#8a2f28; display:flex; align-items:center; justify-content:center; font-size:11px;}
  .pill-user{display:flex; align-items:center; gap:8px; background:var(--side-dark-a); color:#fff; padding:6px 16px 6px 6px; border-radius:999px; font-size:12.5px; font-weight:600;}
  .pill-user .ic{width:26px; height:26px; border-radius:50%; background:rgba(255,255,255,0.15); display:flex; align-items:center; justify-content:center; font-size:11px;}

  .date-line{color:var(--brand-green-deep); font-size:12.5px; font-weight:600; margin-bottom:3px;}
  .page-title-big{font-size:28px; font-weight:800; color:var(--ink); margin-bottom:6px; letter-spacing:-0.01em;}

  .info-chips{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:18px;}
  .info-chip{display:flex; align-items:center; gap:8px; background:var(--green-tint); color:var(--green-text); border-radius:999px; padding:7px 16px; font-size:12px; font-weight:600;}
  .info-chip i{font-size:12px;}
  .info-chip.muted{background:#f2f2f0; color:var(--text-soft);}

  /* ---------- stat cards ---------- */
  .stats{display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:18px;}
  .stat{background:rgba(255,255,255,0.9); border:1px solid rgba(255,255,255,0.7); box-shadow:0 8px 20px -14px rgba(20,30,20,0.25); border-radius:20px; padding:14px 16px; display:flex; align-items:center; gap:12px;}
  .stat-icon{width:38px; height:38px; border-radius:13px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0;}
  .stat-icon.ink{background:var(--side-dark-a); color:#fff;}
  .stat-icon.green{background:var(--green-tint); color:var(--green-text);}
  .stat-icon.amber{background:var(--amber-tint); color:var(--amber-text);}
  .stat-icon.rust{background:var(--rust-tint); color:var(--rust-text);}
  .stat-label{font-size:11px; color:var(--text-soft); margin-bottom:2px;}
  .stat-value{font-weight:700; font-size:19px;}

  /* ---------- bento dashboard ---------- */
  /* ---------- hero black tile (MyOnze reference) ---------- */
  .hero-black{background:radial-gradient(140% 140% at 20% 0%, #1a1c19 0%, #0a0b09 70%); border-radius:26px; padding:24px 28px; color:#fff; margin-bottom:16px; box-shadow:0 20px 40px -22px rgba(0,0,0,0.5);}
  .hero-row{display:flex;}
  .hero-col{flex:1; text-align:center; position:relative;}
  .hero-col:not(:last-child)::after{content:''; position:absolute; right:0; top:10%; bottom:10%; width:1px; background:rgba(255,255,255,0.14);}
  .hero-num{font-size:44px; font-weight:800; line-height:1;}
  .hero-label{font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:rgba(255,255,255,0.6); margin-top:6px; font-weight:600;}
  .hero-sub{text-align:center; margin-top:16px; padding-top:14px; border-top:1px solid rgba(255,255,255,0.12); font-size:12px; color:rgba(255,255,255,0.65);}

  .pair-row{display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:16px;}
  .info-card{border-radius:22px; padding:16px 18px; display:flex; align-items:center; gap:14px;}
  .info-card.light{background:rgba(255,255,255,0.9); border:1px solid rgba(255,255,255,0.7); box-shadow:0 8px 20px -14px rgba(20,30,20,0.25);}
  .info-card.green{background:var(--brand-green); color:var(--side-dark-b);}
  .info-card .ic-circle{width:38px; height:38px; border-radius:50%; background:rgba(0,0,0,0.08); display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0;}
  .info-card.green .ic-circle{background:rgba(255,255,255,0.35);}
  .info-card .ic-label{font-size:10.5px; letter-spacing:.05em; text-transform:uppercase; font-weight:700; opacity:.75;}
  .info-card .ic-value{font-size:13px; margin-top:2px; font-weight:600;}

  .bento-row{display:grid; gap:16px; margin-bottom:16px;}
  .bento-row.row-a{grid-template-columns:2fr 1fr;}
  .bento-row.row-b{grid-template-columns:1fr 1fr 1fr;}
  .tile{background:rgba(255,255,255,0.9); border:1px solid rgba(255,255,255,0.7); box-shadow:0 10px 26px -18px rgba(20,30,20,0.3); border-radius:24px; padding:18px;}
  .tile-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;}
  .tile-head h3{margin:0; font-size:14.5px; font-weight:700;}
  .tile-link{font-size:11.5px; color:var(--text-soft); cursor:pointer; display:flex; align-items:center; gap:3px;}
  .tile-link:hover{color:var(--ink);}

  .bar-row{margin-bottom:16px;}
  .bar-row:last-child{margin-bottom:0;}
  .bar-row-head{display:flex; justify-content:space-between; font-size:12px; margin-bottom:6px;}
  .bar-row-head .cat{font-weight:600;}
  .bar-row-head .n{color:var(--text-faint); font-weight:600;}
  .bar-track{display:flex; height:14px; border-radius:8px; overflow:hidden; background:#f1f1ef;}
  .bar-seg{height:100%;}

  .donut-wrap{display:flex; align-items:center; gap:16px;}
  .donut-legend{flex:1; display:flex; flex-direction:column; gap:9px;}
  .donut-legend-row{display:flex; align-items:center; gap:8px; font-size:12px;}
  .donut-legend-dot{width:9px; height:9px; border-radius:50%; flex-shrink:0;}
  .donut-legend-val{margin-left:auto; font-weight:700; font-size:12px;}

  .reminder-row{display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--line); font-size:12.5px;}
  .reminder-row:last-child{border-bottom:none;}
  .reminder-row.done .reminder-label{text-decoration:line-through; color:var(--text-faint);}
  .reminder-check{width:18px; height:18px; border-radius:50%; border:1.5px solid var(--line-strong); flex-shrink:0; cursor:pointer; display:flex; align-items:center; justify-content:center;}
  .reminder-row.done .reminder-check{background:var(--vivid-green); border-color:var(--vivid-green); color:#0a2015;}
  .reminder-due{color:var(--text-faint); font-size:10.5px; margin-left:auto; font-weight:600;}

  .doc-row{display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--line);}
  .doc-row:last-child{border-bottom:none;}
  .doc-icon{width:32px; height:32px; border-radius:11px; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0;}
  .doc-name{font-size:12px; font-weight:600;}
  .doc-status{font-size:10px; margin-left:auto; padding:2px 8px; border-radius:999px; font-weight:600;}
  .doc-status.ok{background:var(--green-tint); color:var(--green-text);}
  .doc-status.warn{background:var(--amber-tint); color:var(--amber-text);}

  .quicklinks{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:26px;}
  .quick-pill{display:flex; align-items:center; gap:8px; border:none; background:var(--side-dark-a); border-radius:999px; padding:10px 18px; font-size:12.5px; font-weight:600; color:#fff; cursor:pointer;}
  .quick-pill i{font-size:14px; color:var(--brand-green);}
  .quick-pill:hover{background:var(--side-dark-b);}

  /* ---------- pill filters ---------- */
  .filters{display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:18px;}
  .pill-select, .pill-search, .btn-pill{height:40px; border-radius:999px; border:1px solid var(--line-strong); background:#f7f7f6; font-family:'Geist'; font-size:12.5px; color:var(--ink); display:flex; align-items:center;}
  .pill-select{padding:0 26px 0 12px; gap:8px; cursor:pointer; position:relative;}
  .pill-select select{appearance:none; -webkit-appearance:none; border:none; background:transparent; font-family:'Geist'; font-size:12.5px; color:var(--ink); cursor:pointer;}
  .pill-select i{font-size:13px; color:var(--text-faint);}
  .pill-select::after{content:''; position:absolute; right:12px; top:50%; width:7px; height:7px; border-right:1.5px solid var(--text-faint); border-bottom:1.5px solid var(--text-faint); transform:translateY(-65%) rotate(45deg); pointer-events:none;}
  .pill-search{padding:0 14px; gap:8px; width:230px;}
  .pill-search i{font-size:13px; color:var(--text-faint);}
  .pill-search input{border:none; background:transparent; outline:none; font-family:'Geist'; font-size:12.5px; flex:1; color:var(--ink);}
  .pill-search .kbd{font-size:10.5px; color:var(--text-faint); border:1px solid var(--line-strong); border-radius:5px; padding:2px 5px;}
  .btn-pill{padding:0 16px; gap:6px; cursor:pointer; font-weight:600;}
  .btn-pill.ghost:hover{border-color:#cfd0d6;}
  .btn-pill.solid{background:var(--brand-green); border-color:var(--brand-green); color:var(--side-dark-b); font-weight:700; margin-left:auto;}
  .btn-pill.solid:hover{filter:brightness(0.96);}
  .seg{display:flex; background:#f7f7f6; border:1px solid var(--line-strong); border-radius:999px; padding:3px;}
  .seg button{border:none; background:transparent; font-family:'Geist'; font-size:12.5px; font-weight:600; padding:7px 16px; border-radius:999px; cursor:pointer; color:var(--text-soft);}
  .seg button.active{background:var(--brand-green); color:var(--side-dark-b);}
  .chip{border:1px solid var(--line-strong); background:#f7f7f6; border-radius:999px; padding:7px 14px; font-size:12px; color:var(--text-soft); cursor:pointer;}
  .chip.active{background:var(--brand-green); color:var(--side-dark-b); border-color:var(--brand-green); font-weight:700;}

  /* ---------- column head ---------- */
  .col-head{display:flex; align-items:center; padding:0 18px 8px; gap:14px; font-size:11px; letter-spacing:.03em; text-transform:uppercase; color:var(--text-faint); font-weight:600;}
  .col-head span{cursor:pointer; display:flex; align-items:center; gap:4px;}
  .col-head span i{font-size:11px;}
  .c-player{width:34px;}
  .c-name{flex:1.6; min-width:0;}
  .c-email{flex:1.5;}
  .c-phone{flex:1;}
  .c-status{width:120px;}
  .c-cotis{width:140px;}
  .c-chev{width:18px;}

  .group-head{display:flex; justify-content:space-between; align-items:baseline; padding:16px 18px 8px; margin-top:4px; border-bottom:1px solid var(--line);}
  .group-head .name{font-weight:700; font-size:14.5px;}
  .group-head .count{color:var(--text-faint); font-weight:400; font-size:12.5px;}
  .group-head .breakdown{font-size:11.5px; color:var(--text-soft); font-weight:600;}

  .list{background:rgba(255,255,255,0.9); border:1px solid rgba(255,255,255,0.7); box-shadow:0 10px 26px -18px rgba(20,30,20,0.25); border-radius:22px; overflow:hidden; margin-bottom:16px;}
  .row{display:flex; align-items:center; gap:14px; padding:11px 18px; border-bottom:1px solid var(--line); cursor:pointer;}
  .row:last-child{border-bottom:none;}
  .row:hover{background:#f7f9f7;}
  .row input[type=checkbox]{margin:0;}
  .kit{width:34px; height:34px; flex-shrink:0; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12px;}
  .kit.seniors{background:var(--cat-seniors-bg); color:var(--cat-seniors-text);}
  .kit.u17{background:var(--cat-u17-bg); color:var(--cat-u17-text);}
  .kit.u15{background:var(--cat-u15-bg); color:var(--cat-u15-text);}
  .name-col{flex:1.6; min-width:0;}
  .player-name{font-weight:600; font-size:13.5px;}
  .player-num{color:var(--text-faint); font-size:11px; font-weight:600;}
  .email-col, .phone-col{font-size:12.5px; color:var(--text-soft); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .email-col{flex:1.5;}
  .phone-col{flex:1;}
  .status-col{width:120px; display:flex; align-items:center; gap:7px; font-size:12.5px;}
  .dot{width:8px; height:8px; border-radius:50%; flex-shrink:0;}
  .dot.green{background:var(--green-text);}
  .dot.amber{background:var(--amber-text);}
  .dot.rust{background:var(--rust-text);}
  .cotis-col{width:140px; display:flex; align-items:center; gap:8px;}
  .gauge{flex:1; height:6px; background:#eef0ed; border-radius:20px; overflow:hidden;}
  .gauge-fill{height:100%; border-radius:20px;}
  .cotis-value{font-size:11.5px; font-weight:700; width:32px; text-align:right;}
  .chev{width:18px; color:var(--text-faint); font-size:13px; text-align:right;}

  .pagination{display:flex; justify-content:center; gap:6px; margin-top:6px;}
  .page-pill{width:30px; height:30px; border-radius:50%; border:1px solid var(--line-strong); background:#f7f7f6; display:flex; align-items:center; justify-content:center; font-size:12px; color:var(--text-soft); cursor:pointer;}
  .page-pill.active{background:var(--brand-green); color:var(--side-dark-b); border-color:var(--brand-green); font-weight:700;}

  /* ---------- overlay / drawer / modal ---------- */
  .overlay{position:fixed; inset:0; background:rgba(10,25,15,0.4); display:none; align-items:stretch; justify-content:flex-end; z-index:50;}
  .overlay.center{align-items:center; justify-content:center;}
  .overlay.show{display:flex;}
  .drawer{width:380px; background:#fff; height:100%; padding:26px; overflow-y:auto;}
  .drawer-head{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:20px;}
  .drawer-close{border:none; background:#f4f4f5; width:30px; height:30px; border-radius:50%; cursor:pointer; color:var(--text-soft);}
  .drawer-kit{width:56px; height:56px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:17px; margin-bottom:10px;}
  .drawer-name{font-weight:700; font-size:18px;}
  .drawer-tag{display:inline-block; font-size:11.5px; padding:3px 10px; border-radius:999px; margin-top:6px; font-weight:600;}
  .drawer-section{margin-top:20px; padding-top:16px; border-top:1px solid var(--line);}
  .drawer-section h4{font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--text-faint); margin:0 0 10px;}
  .drawer-row{display:flex; justify-content:space-between; align-items:center; padding:6px 0; font-size:13px;}
  .drawer-row .label{color:var(--text-soft); display:flex; align-items:center; gap:8px;}
  .drawer-row .value{font-weight:600;}
  .echeance{display:flex; justify-content:space-between; font-size:12.5px; padding:5px 0; color:var(--text-soft);}
  .echeance .paid{color:var(--green-text); font-weight:600;}

  .modal{width:480px; max-width:92vw; background:#fff; border-radius:24px; padding:26px; max-height:90vh; overflow-y:auto;}
  .modal-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:18px;}
  .modal-head h3{margin:0; font-size:17px; font-weight:700;}
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:12px; color:var(--text-soft); margin-bottom:6px;}
  .field input, .field select, .field textarea{width:100%; height:38px; border-radius:11px; border:1px solid var(--line-strong); background:#f7f7f6; padding:0 12px; font-family:'Geist'; font-size:13px; color:var(--ink);}
  .field textarea{height:64px; padding:10px 12px; resize:vertical;}
  .field-row{display:flex; gap:12px;}
  .field-row .field{flex:1;}
  .modal-actions{display:flex; justify-content:flex-end; gap:10px; margin-top:18px;}
  .btn-ghost{border:1px solid var(--line-strong); background:#fff; border-radius:999px; padding:0 18px; height:38px; font-family:'Geist'; font-size:12.5px; font-weight:600; cursor:pointer; color:var(--text-soft);}
  .btn-solid{border:none; background:var(--brand-green); color:var(--side-dark-b); border-radius:999px; padding:0 18px; height:38px; font-family:'Geist'; font-size:12.5px; font-weight:700; cursor:pointer;}

  /* ---------- Mon club ---------- */
  .club-card{background:rgba(255,255,255,0.9); border:1px solid rgba(255,255,255,0.7); box-shadow:0 10px 26px -18px rgba(20,30,20,0.25); border-radius:26px; padding:24px; max-width:640px;}
  .club-logo-row{display:flex; align-items:center; gap:16px; margin-bottom:22px;}
  .club-logo{width:64px; height:64px; border-radius:18px; background:var(--side-dark-a); display:flex; align-items:center; justify-content:center; font-weight:800; color:var(--brand-green); font-size:18px;}
  .terrain-row{display:flex; gap:10px; align-items:center; margin-bottom:10px;}
  .terrain-row input{flex:1;}
  .icon-x{width:34px; height:34px; border-radius:11px; border:1px solid var(--line-strong); background:#fff; color:var(--text-soft); cursor:pointer; flex-shrink:0;}
  .add-terrain{border:1px dashed var(--line-strong); background:transparent; border-radius:11px; height:38px; width:100%; color:var(--text-soft); font-family:'Geist'; font-size:12.5px; cursor:pointer; margin-top:2px;}

/* ---------------- load everything for the logged-in club ---------------- */
async function loadClubData(){
  const [pRes, sRes, dRes, tRes, rRes, sessRes] = await Promise.all([
    sb.from('players').select('*').eq('club_id', currentClub.id).order('name'),
    sb.from('staff').select('*').eq('club_id', currentClub.id).order('name'),
    sb.from('documents').select('*').eq('club_id', currentClub.id),
    sb.from('terrains').select('*').eq('club_id', currentClub.id),
    sb.from('reminders').select('*').eq('club_id', currentClub.id),
    sb.from('sessions').select('*').eq('club_id', currentClub.id)
  ]);

  players = (pRes.data || []).map(function(p){ return {id:p.id, name:p.name, number:p.number, category:p.category, status:p.status, cotis:p.cotis, email:p.email, phone:p.phone, address:p.address, birth:p.birth, licence:p.licence}; });
  staff = (sRes.data || []).map(function(s){ return {id:s.id, name:s.name, role:s.role, team:s.team, email:s.email, phone:s.phone, status:s.status, diploma:s.diploma}; });
  documents = (dRes.data || []).map(function(d){ return {id:d.id, name:d.name, icon:d.icon || 'fa-file-lines', status:d.status, date:d.date_info, bg:d.bg || '#f1f1ef', color:d.color || '#5a5f58', fileUrl:d.file_url, fileName:d.file_name}; });
  terrains = (tRes.data || []).map(function(t){ return {id:t.id, label:t.name + (t.address ? ' - ' + t.address : ''), name:t.name, address:t.address}; });
  reminders = (rRes.data || []).map(function(r){ return {id:r.id, label:r.label, due:r.due, done:r.done}; });

  sessionsByMonth = {};
  (sessRes.data || []).forEach(function(s){
    if(!sessionsByMonth[s.month_label]){ sessionsByMonth[s.month_label] = []; }
    sessionsByMonth[s.month_label].push({id:s.id, day:s.day, time:s.time_range, team:s.category, category:s.category, field:s.field});
  });
  if(Object.keys(sessionsByMonth).length){ currentMonth = Object.keys(sessionsByMonth)[0]; }

  if(terrains.length === 0){
    // seed two default terrains so Horaire has somewhere to show sessions
    const {data} = await sb.from('terrains').insert([
      {club_id: currentClub.id, name:'Terrain A', address:''},
      {club_id: currentClub.id, name:'Terrain B', address:''}
    ]).select();
    terrains = (data || []).map(function(t){ return {id:t.id, label:t.name, name:t.name, address:t.address}; });
  }
}

    '</div>' +

    '<div class="club-card">' +
      '<div class="tile-head" style="margin-bottom:16px;"><h3>Apparence de l\'interface</h3></div>' +
      '<div style="font-size:12px; color:var(--text-soft); margin-bottom:12px;">Choisis la couleur d\'accent utilisée dans toute l\'application.</div>' +

  document.getElementById('paramLogoBtn').addEventListener('click', function(){ document.getElementById('paramLogoFile').click(); });

    document.getElementById('paramLogo').textContent = '';
    document.getElementById('pillClubIcon').innerHTML = '<img src="' + publicUrl + '" style="width:100%; height:100%; border-radius:50%; object-fit:cover;" />';
    showToast('Logo mis à jour');
  });

  document.getElementById('paramSaveIdentity').addEventListener('click', async function(){
    const updates = {
      name: document.getElementById('paramClubName').value.trim() || currentClub.name,
      representative: document.getElementById('paramRepName').value.trim() || currentClub.representative

    Object.assign(currentClub, updates);
    document.getElementById('pillClubName').textContent = currentClub.name;
    document.getElementById('pillUserName').textContent = currentClub.representative;
    showToast('Identité mise à jour');
  });

  document.querySelectorAll('.accent-swatch').forEach(function(sw){
    sw.addEventListener('click', function(){
      document.documentElement.style.setProperty('--brand-green', sw.dataset.color);
      document.querySelectorAll('.accent-swatch').forEach(function(x){ x.style.borderColor = 'transparent'; });
      sw.style.borderColor = 'var(--ink)';
      showToast('Couleur d\'accent mise à jour');
    });
  });
}

function renderDocumentsView(){
  const content = document.getElementById('content');

         '<div style="display:flex; gap:8px;">' +
           '<a href="' + d.fileUrl + '" download="' + d.fileName + '" class="btn-pill ghost" style="text-decoration:none; height:34px; font-size:11.5px;"><i class="fa-solid fa-download" aria-hidden="true"></i>Télécharger</a>' +
           '<button class="btn-pill ghost" style="height:34px; font-size:11.5px;" onclick="triggerDocUpload(' + i + ')"><i class="fa-solid fa-arrows-rotate" aria-hidden="true"></i>Remplacer</button>' +
         '</div>')
        :
        '<button class="btn-pill ghost" style="height:34px; font-size:11.5px;" onclick="triggerDocUpload(' + i + ')"><i class="fa-solid fa-upload" aria-hidden="true"></i>Choisir un PDF</button>'

function triggerDocUpload(i){ document.getElementById('docFile' + i).click(); }
async function handleDocUpload(i, input){
  const file = input.files[0];
  if(!file) return;
  const path = currentClub.id + '/' + Date.now() + '_' + file.name;
  const {error: upErr} = await sb.storage.from('documents').upload(path, file, {upsert:true});
  if(upErr){ showToast('Erreur upload : ' + upErr.message); return; }
  const {data:{publicUrl}} = sb.storage.from('documents').getPublicUrl(path);
  const {error} = await sb.from('documents').update({file_url: publicUrl, file_name: file.name}).eq('id', documents[i].id);
  if(error){ showToast('Erreur : ' + error.message); return; }
  documents[i].fileUrl = publicUrl;
  documents[i].fileName = file.name;
  renderDocumentGrid();
  showToast('Document mis à jour');
}

    renderDocumentGrid();
    showToast('Document ajouté');
  });

}

function buildDonut(segments, centerLabel, centerValue){
  const r = 42, cx = 55, cy = 55, sw = 14;
  const circ = 2 * Math.PI * r;
  let offset = 0;
  let circles = '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="#eef0ee" stroke-width="' + sw + '"></circle>';
  segments.forEach(function(s){
    const len = (s.value / 100) * circ;
    circles += '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="' + s.color + '" stroke-width="' + sw + '" stroke-dasharray="' + len + ' ' + (circ - len) + '" stroke-dashoffset="' + (-offset) + '" stroke-linecap="round" transform="rotate(-90 ' + cx + ' ' + cy + ')"></circle>';
    offset += len;
  });
  return '<svg width="110" height="110" viewBox="0 0 110 110">' + circles +
    '<text x="55" y="51" text-anchor="middle" font-family="Geist, sans-serif" font-weight="800" font-size="19" fill="var(--ink)">' + centerValue + '</text>' +
    '<text x="55" y="67" text-anchor="middle" font-family="Geist, sans-serif" font-size="9" fill="var(--text-faint)">' + centerLabel + '</text>' +
  '</svg>';
}

function buildLineChart(values){
  const w = 280, h = 110, pad = 14;
  const max = Math.max.apply(null, values), min = Math.min.apply(null, values);
  const range = (max - min) || 1;
  const stepX = (w - pad * 2) / (values.length - 1);
  const pts = values.map(function(v, i){
    const x = pad + i * stepX;
    const y = h - pad - ((v - min) / range) * (h - pad * 2);
    return [x, y];
  });
  const line = pts.map(function(p, i){ return (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1); }).join(' ');
  const area = line + ' L' + pts[pts.length-1][0].toFixed(1) + ',' + (h-pad) + ' L' + pts[0][0].toFixed(1) + ',' + (h-pad) + ' Z';
  const dots = pts.map(function(p){ return '<circle cx="' + p[0].toFixed(1) + '" cy="' + p[1].toFixed(1) + '" r="3.2" fill="#1fd97a"></circle>'; }).join('');
  return '<svg width="100%" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none">' +
    '<defs><linearGradient id="lineFade" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1fd97a" stop-opacity="0.28"/><stop offset="100%" stop-color="#1fd97a" stop-opacity="0"/></linearGradient></defs>' +
    '<path d="' + area + '" fill="url(#lineFade)"></path>' +
    '<path d="' + line + '" fill="none" stroke="#1fd97a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"></path>' +
    dots +
  '</svg>';
}

function renderDashboard(){
  const ok = players.filter(function(p){ return p.cotis >= 80; }).length;
  const late = players.filter(function(p){ return p.cotis === 0; }).length;
  const mid = players.length - ok - late;
  const total = players.length;

  const upcoming = [];
  dayOrder.forEach(function(day){
    (sessionsByMonth[currentMonth] || []).filter(function(s){ return s.day === day; }).forEach(function(s){ upcoming.push(s); });
  });
  const nextSession = upcoming[0];
  const nextReminder = reminders.find(function(r){ return !r.done; });

  const donut = buildDonut([
    {value: Math.round(ok/total*100), color:'#1fd97a'},
    {value: Math.round(mid/total*100), color:'#ffcd1f'},
    {value: Math.round(late/total*100), color:'#ff4d4d'}
  ], 'affiliés', total);

  const categories = ['Seniors F','U17','U15'];
  const barsHtml = categories.map(function(cat){
    const list = players.filter(function(p){ return p.category === cat; });
    const cOk = list.filter(function(p){ return p.cotis >= 80; }).length;
    const cLate = list.filter(function(p){ return p.cotis === 0; }).length;
    const cMid = list.length - cOk - cLate;
    const n = list.length || 1;
    return '<div class="bar-row">' +
      '<div class="bar-row-head"><span class="cat">' + cat + '</span><span class="n">' + list.length + ' joueuses</span></div>' +
      '<div class="bar-track">' +
        '<div class="bar-seg" style="width:' + (cOk/n*100) + '%; background:#1fd97a;"></div>' +
        '<div class="bar-seg" style="width:' + (cMid/n*100) + '%; background:#ffcd1f;"></div>' +
        '<div class="bar-seg" style="width:' + (cLate/n*100) + '%; background:#ff4d4d;"></div>' +
      '</div>' +
    '</div>';
  }).join('');

  const lineChart = buildLineChart([54, 58, 61, 65, 63, Math.round(ok/total*100)]);

  const content = document.getElementById('content');
  content.innerHTML =

    '<div class="info-chips">' +
      '<div class="info-chip"><i class="fa-solid fa-calendar-day" aria-hidden="true"></i>' + (nextSession ? (nextSession.day + ' · ' + nextSession.time + ' · ' + nextSession.team) : 'Aucune séance planifiée') + '</div>' +
      '<div class="info-chip muted"><i class="fa-solid fa-bell" aria-hidden="true"></i>' + (nextReminder ? nextReminder.label : 'Aucun rappel en attente') + '</div>' +
    '</div>' +

      '<div class="stat"><div class="stat-icon rust"><i class="fa-solid fa-circle-exclamation" aria-hidden="true"></i></div><div><div class="stat-label">Impayées</div><div class="stat-value">' + late + '</div></div></div>' +

      '<div class="tile"><div class="tile-head"><h3>Cotisations par catégorie</h3></div>' + barsHtml + '</div>' +

function renderReminders(){
  document.getElementById('reminderMount').innerHTML = reminders.map(function(r, i){
    return '<div class="reminder-row ' + (r.done ? 'done' : '') + '"><span class="reminder-check" data-i="' + i + '"><i class="fa-solid fa-check" style="font-size:10px; visibility:' + (r.done ? 'visible' : 'hidden') + '" aria-hidden="true"></i></span><span class="reminder-label">' + r.label + '</span><span class="reminder-due">' + r.due + '</span></div>';
  }).join('');
  document.querySelectorAll('.reminder-check').forEach(function(el){
    el.addEventListener('click', async function(){
      const i = parseInt(el.dataset.i);
      reminders[i].done = !reminders[i].done;
      renderReminders();
      const {error} = await sb.from('reminders').update({done: reminders[i].done}).eq('id', reminders[i].id);
      if(error){ showToast('Erreur : ' + error.message); }
    });
  });
}

async function addReminder(){
  const label = window.prompt('Nouveau rappel :');
  if(!label || !label.trim()) return;
  const row = {club_id: currentClub.id, label: label.trim(), due: '—', done:false};
  const {data, error} = await sb.from('reminders').insert(row).select().single();
  if(error){ showToast('Erreur : ' + error.message); return; }
  reminders.push({id:data.id, label:data.label, due:data.due, done:data.done});
  renderReminders();
}

const staffAvatarPalette = [
  {bg:'#e0f2ee', text:'#127a63'},

function staffInitials(name){
  const parts = name.split(' ');
  return (parts[0][0] + (parts[1] ? parts[1][0] : '')).toUpperCase();
}
function sortStaff(arr){
  const dir = staffListState.sortDir === 'asc' ? 1 : -1;
  return [...arr].sort(function(a,b){
    const av = a[staffListState.sortKey], bv = b[staffListState.sortKey];
    if(av < bv) return -1 * dir;
    if(av > bv) return 1 * dir;
    return 0;
  });
}

function sortPlayers(arr){
  const dir = listState.sortDir === 'asc' ? 1 : -1;
  return [...arr].sort(function(a,b){
    let av, bv;
    if(listState.sortKey === 'name'){ av = a.name; bv = b.name; }
    else if(listState.sortKey === 'status'){ av = statusMap[a.status].label; bv = statusMap[b.status].label; }
    else { av = a.cotis; bv = b.cotis; }
    if(av < bv) return -1 * dir;
    if(av > bv) return 1 * dir;
    return 0;
  });
}

function groupHeadHtml(cat, list){
  const ok = list.filter(function(p){ return p.cotis >= 80; }).length;
  const late = list.filter(function(p){ return p.cotis === 0; }).length;
  const mid = list.length - ok - late;
  return '<div class="group-head"><div><span class="name">' + cat + '</span> <span class="count">' + list.length + ' joueuses</span></div><div class="breakdown">' + ok + ' à jour · ' + mid + ' échelonnées · ' + late + ' impayées</div></div>';
}

function renderPlayerList(){
  let filtered = players.filter(function(p){ return p.name.toLowerCase().includes(listState.query.toLowerCase()); });
  if(listState.category !== 'all'){ filtered = filtered.filter(function(p){ return p.category === listState.category; }); }

  const ok = filtered.filter(function(p){ return p.cotis >= 80; }).length;
  const late = filtered.filter(function(p){ return p.cotis === 0; }).length;
  const mid = filtered.length - ok - late;
  document.getElementById('statTotal').textContent = filtered.length;
  document.getElementById('statOk').textContent = ok;
  document.getElementById('statMid').textContent = mid;
  document.getElementById('statLate').textContent = late;

  const mount = document.getElementById('playerListMount');
  let html = '';
  if(listState.grouped && listState.category === 'all'){
    ['Seniors F','U17','U15'].filter(function(c){ return filtered.some(function(p){ return p.category === c; }); }).forEach(function(cat){
      const list = sortPlayers(filtered.filter(function(p){ return p.category === cat; }));
      html += groupHeadHtml(cat, list);
      html += '<div class="list">' + list.map(function(p){ return rowHtml(p, players.indexOf(p)); }).join('') + '</div>';
    });
  } else {
    const list = sortPlayers(filtered);
    html += '<div class="list">' + list.map(function(p){ return rowHtml(p, players.indexOf(p)); }).join('') + '</div>';
  }
  mount.innerHTML = html || '<div class="empty-view"><i class="fa-solid fa-users" aria-hidden="true"></i>Aucun joueur ne correspond à ces filtres.</div>';

  const icons = {name:'sortName', status:'sortStatus', cotis:'sortCotis'};
  ['name','status','cotis'].forEach(function(key){
    const el = document.getElementById(icons[key]);
    const icon = el.querySelector('i');
    if(listState.sortKey === key){ icon.style.visibility = 'visible'; icon.className = listState.sortDir === 'asc' ? 'fa-solid fa-arrow-up' : 'fa-solid fa-arrow-down'; }
    else { icon.style.visibility = 'hidden'; }
  });

  mount.querySelectorAll('.row').forEach(function(row){
    row.addEventListener('click', function(){ openDrawer(players[parseInt(row.dataset.index)]); });
  });
}

      staff.push({id:data.id, name:data.name, role:data.role, team:data.team, email:data.email, phone:data.phone, status:data.status, diploma:data.diploma});

        phone: document.getElementById('fPhone').value || '—',
        address: document.getElementById('fAddr').value || '—',
        birth: '—',
        licence: '—'

      players.push({id:data.id, name:data.name, number:data.number, category:data.category, status:data.status, cotis:data.cotis, email:data.email, phone:data.phone, address:data.address, birth:data.birth, licence:data.licence});

  const mount = document.getElementById('terrainList');
  mount.innerHTML = terrains.map(function(t, i){

  }).join('');
  mount.querySelectorAll('.terrainInput').forEach(function(inp){
    inp.addEventListener('change', async function(e){
      const i = parseInt(e.target.dataset.i);
      const field = e.target.dataset.field;
      terrains[i][field] = e.target.value;
      const {error} = await sb.from('terrains').update({[field]: e.target.value}).eq('id', terrains[i].id);
      if(error){ showToast('Erreur : ' + error.message); }
    });
  });
  mount.querySelectorAll('.icon-x').forEach(function(btn){
    btn.addEventListener('click', async function(){
      const i = parseInt(btn.dataset.i);
      const {error} = await sb.from('terrains').delete().eq('id', terrains[i].id);

function shiftMonth(dir){
  const months = Object.keys(sessionsByMonth);
  let idx = months.indexOf(currentMonth);
  idx = (idx + dir + months.length) % months.length;
  currentMonth = months[idx];
  renderHoraireGrid();
}

function renderHoraireGrid(){
  document.getElementById('monthLabel').textContent = currentMonth;
  const terrainNames = terrains.map(function(t){ return t.name; });
  const monthSessions = (sessionsByMonth[currentMonth] || []).filter(function(s){ return horaireCategory === 'all' || s.category === horaireCategory; });

  let grid = '<div class="planning-head"></div>';
  dayOrder.forEach(function(d){ grid += '<div class="planning-head">' + d + '</div>'; });

  terrainNames.forEach(function(tname){
    grid += '<div class="planning-terrain">' + tname + '</div>';
    dayOrder.forEach(function(day){
      const list = monthSessions.filter(function(s){ return s.field === tname && s.day === day; });
      grid += '<div class="planning-cell">' + list.map(function(s){
        const cc = catClass[s.category];
        const bg = cc === 'seniors' ? 'var(--cat-seniors-bg)' : cc === 'u17' ? 'var(--cat-u17-bg)' : 'var(--cat-u15-bg)';
        const tx = cc === 'seniors' ? 'var(--cat-seniors-text)' : cc === 'u17' ? 'var(--cat-u17-text)' : 'var(--cat-u15-text)';
        return '<div class="plan-tile" style="background:' + bg + '; color:' + tx + ';"><div class="t-time">' + s.time + '</div><div class="t-team">' + s.team + '</div></div>';
      }).join('') + '</div>';
    });
  });

  document.getElementById('planningGrid').innerHTML = grid;
}

document.getElementById('loginSubmit').addEventListener('click', async function(){
  const isSignup = document.getElementById('tabSignup').classList.contains('active');
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value.trim();
  const errEl = document.getElementById('loginError');
  if(!email || !pass || (isSignup && (!document.getElementById('suClub').value.trim() || !document.getElementById('suName').value.trim()))){
    errEl.textContent = 'Merci de compléter les champs requis.';
    errEl.style.display = 'block';
    return;
  }
  errEl.style.display = 'none';
  const submitBtn = document.getElementById('loginSubmit');
  submitBtn.textContent = 'Un instant...';
  submitBtn.disabled = true;

  try{
    if(isSignup){
      const clubName = document.getElementById('suClub').value.trim();
      const repName = document.getElementById('suName').value.trim();

      const {data: authData, error: authErr} = await sb.auth.signUp({email, password: pass});
      if(authErr) throw authErr;

      if(!authData.session){
        errEl.textContent = "Compte créé — vérifie ta boîte mail pour confirmer ton adresse, puis connecte-toi.";
        errEl.style.color = 'var(--green-text)';
        errEl.style.display = 'block';
        document.getElementById('tabLogin').click();
        return;
      }
      currentUser = authData.user;

      const {data: club, error: clubErr} = await sb.from('clubs').insert({owner_id: currentUser.id, name: clubName, representative: repName}).select().single();
      if(clubErr) throw clubErr;
      currentClub = club;

      if(suLogoFileRef){
        const path = currentClub.id + '/logo_' + Date.now() + '_' + suLogoFileRef.name;
        const {error: upErr} = await sb.storage.from('logos').upload(path, suLogoFileRef, {upsert:true});
        if(!upErr){
          const {data:{publicUrl}} = sb.storage.from('logos').getPublicUrl(path);
          await sb.from('clubs').update({logo_url: publicUrl}).eq('id', currentClub.id);
          currentClub.logo_url = publicUrl;
        }
      }
    } else {
      const {data: authData, error: authErr} = await sb.auth.signInWithPassword({email, password: pass});
      if(authErr) throw authErr;
      currentUser = authData.user;

      const {data: club, error: clubErr} = await sb.from('clubs').select('*').eq('owner_id', currentUser.id).single();
      if(clubErr) throw clubErr;
      currentClub = club;
    }

    document.getElementById('pillClubName').textContent = currentClub.name;
    document.getElementById('pillUserName').textContent = currentClub.representative || 'Représentant';
    if(currentClub.logo_url){
      document.getElementById('pillClubIcon').innerHTML = '<img src="' + currentClub.logo_url + '" style="width:100%; height:100%; border-radius:50%; object-fit:cover;" />';
    }

    await loadClubData();
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appRoot').style.display = 'block';
    renderView('dashboard');
  } catch(err){
    errEl.style.color = 'var(--rust-text)';
    errEl.textContent = err.message || "Une erreur est survenue.";
    errEl.style.display = 'block';
  } finally {
    submitBtn.textContent = 'Accéder au portail';
    submitBtn.disabled = false;
  }
});

/* ---------------- editable representative name ---------------- */
document.getElementById('pillUser').addEventListener('click', function(){
  document.getElementById('modal').innerHTML =
    '<div class="modal-head"><h3>Représentant du club</h3><button class="drawer-close" id="closeRepModal"><i class="fa-solid fa-xmark" aria-hidden="true"></i></button></div>' +
    '<div class="field"><label>Nom du représentant</label><input id="repNameInput" value="' + document.getElementById('pillUserName').textContent + '" /></div>' +
    '<div class="modal-actions"><button class="btn-ghost" id="cancelRepModal">Annuler</button><button class="btn-solid" id="saveRepModal">Enregistrer</button></div>';
  document.getElementById('closeRepModal').addEventListener('click', closeModal);
  document.getElementById('cancelRepModal').addEventListener('click', closeModal);
  document.getElementById('saveRepModal').addEventListener('click', async function(){
    const v = document.getElementById('repNameInput').value.trim();
    if(v){
      document.getElementById('pillUserName').textContent = v;
      const {error} = await sb.from('clubs').update({representative: v}).eq('id', currentClub.id);
      if(error){ showToast('Erreur : ' + error.message); closeModal(); return; }
      currentClub.representative = v;
    }
    closeModal();
    showToast('Représentant mis à jour');
  });
  document.getElementById('modalOverlay').classList.add('show');
});
</script>
